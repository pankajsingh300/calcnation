<main class="tool-page">
<div class="tool-header">
  <div class="tool-icon">📸</div>
  <h1>Scan to PDF</h1>
  <p class="tool-desc">Convert photos or camera scans into a PDF document. Upload images or take a photo directly from your device camera.</p>
  <div class="tool-badges"><span class="badge">🔒 100% Private</span><span class="badge">⚡ Instant</span><span class="badge">✅ No Signup</span></div>
</div>
<div class="tool-card">
  <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap">
    <button class="btn-secondary" id="uploadBtn">📁 Upload Images</button>
    <button class="btn-secondary" id="cameraBtn">📷 Take Photo</button>
    <input type="file" id="imgInput" accept="image/*" multiple style="display:none">
    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
  </div>
  <div id="imgList" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;margin-bottom:16px"></div>
  <div id="convertArea" style="display:none">
    <div class="form-group">
      <label>Page Size</label>
      <select id="pageSize" class="form-input" style="width:150px">
        <option value="a4">A4</option>
        <option value="letter">Letter</option>
        <option value="fit">Fit to Image</option>
      </select>
    </div>
    <button class="btn-primary" id="convertBtn">📄 Create PDF</button>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script>
let images=[];
document.getElementById('uploadBtn').addEventListener('click',()=>document.getElementById('imgInput').click());
document.getElementById('cameraBtn').addEventListener('click',()=>document.getElementById('cameraInput').click());
document.getElementById('imgInput').addEventListener('change',e=>addImages(e.target.files));
document.getElementById('cameraInput').addEventListener('change',e=>addImages(e.target.files));
function addImages(files){
  [...files].forEach(f=>{
    if(!f.type.startsWith('image/'))return;
    const reader=new FileReader();
    reader.onload=e=>{
      images.push({data:e.target.result,name:f.name});
      renderImages();
    };
    reader.readAsDataURL(f);
  });
}
function renderImages(){
  const list=document.getElementById('imgList');
  list.innerHTML='';
  images.forEach((img,i)=>{
    const div=document.createElement('div');
    div.style.cssText='background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px;position:relative;text-align:center';
    div.innerHTML=`<img loading="lazy" src="${img.data}" style="width:100%;height:80px;object-fit:cover;border-radius:4px"><div style="font-size:11px;color:var(--text2);margin-top:4px">Page ${i+1}</div><button onclick="removeImg(${i})" style="position:absolute;top:4px;right:4px;background:var(--accent2);border:none;color:#fff;border-radius:4px;cursor:pointer;font-size:11px;padding:2px 6px">✕</button>`;
    list.appendChild(div);
  });
  document.getElementById('convertArea').style.display=images.length?'block':'none';
}
function removeImg(i){images.splice(i,1);renderImages();}
document.getElementById('convertBtn').addEventListener('click',async()=>{
  if(!images.length)return;
  const btn=document.getElementById('convertBtn');btn.textContent='🔄 Creating PDF...';btn.disabled=true;
  try{
    const pdfDoc=await PDFLib.PDFDocument.create();
    const size=document.getElementById('pageSize').value;
    for(const img of images){
      let embImg,dims;
      if(img.data.includes('image/jpeg')||img.data.includes('image/jpg')){
        const resp=await fetch(img.data);const ab=await resp.arrayBuffer();
        embImg=await pdfDoc.embedJpg(ab);
      }else{
        const resp=await fetch(img.data);const ab=await resp.arrayBuffer();
        embImg=await pdfDoc.embedPng(ab);
      }
      dims=embImg.scale(1);
      let pw,ph;
      if(size==='a4'){pw=595;ph=842;}
      else if(size==='letter'){pw=612;ph=792;}
      else{pw=dims.width;ph=dims.height;}
      const page=pdfDoc.addPage([pw,ph]);
      const scale=Math.min(pw/dims.width,ph/dims.height);
      const w=dims.width*scale,h=dims.height*scale;
      page.drawImage(embImg,{x:(pw-w)/2,y:(ph-h)/2,width:w,height:h});
    }
    const bytes=await pdfDoc.save();
    const blob=new Blob([bytes],{type:'application/pdf'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='scanned-document.pdf';a.click();
  }catch(e){alert('Error: '+e.message);}
  btn.textContent='📄 Create PDF';btn.disabled=false;
});
</script>
