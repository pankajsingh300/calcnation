<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit PDF — CalcNation</title>
<meta name="description" content="Add text to your PDF. Choose position, font size and color. Free, no signup.">
<link rel="canonical" href="https://calcnation-jade.vercel.app/pdf/edit.html">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<link rel="stylesheet" href="../assets/css/main.css">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-PP2M41QH5D"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-PP2M41QH5D');</script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8624973090847331" crossorigin="anonymous"></script>
</head>
<body>
<script src="../assets/js/nav-loader.js"></script>
<div class="breadcrumb"><a href="../index.html">Home</a> <span>›</span> <a href="../index.html#pdf">PDF Tools</a> <span>›</span> <span>Edit PDF</span></div>
<main class="tool-page">
<div class="tool-header">
  <div class="tool-icon">✏️</div>
  <h1>Edit PDF</h1>
  <p class="tool-desc">Add text to your PDF. Choose position, font size and color. Free, no signup.</p>
  <div class="tool-badges"><span class="badge">🔒 100% Private</span><span class="badge">⚡ Instant</span><span class="badge">✅ No Signup</span></div>
</div>
<div class="tool-card">
  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">✏️</div>
    <p>Drop your file here</p>
    <input type="file" id="fileInput" accept=".pdf" style="margin-top:12px">
    <p style="color:var(--text2);font-size:12px;margin-top:8px">Max 100MB · Works in your browser · 100% Private</p>
  </div>
  <div id="fileInfo" style="display:none" class="file-info"></div>
  <div id="options" style="display:none">

    <div class="options-grid">
      <div class="form-group"><label>Text to Add</label><input type="text" id="addText" class="form-input" placeholder="Type text..."></div>
      <div class="form-group"><label>Page Number</label><input type="number" id="editPage" class="form-input" value="1" min="1"></div>
      <div class="form-group"><label>X (from left)</label><input type="number" id="posX" class="form-input" value="50"></div>
      <div class="form-group"><label>Y (from bottom)</label><input type="number" id="posY" class="form-input" value="50"></div>
      <div class="form-group"><label>Font Size</label><input type="number" id="editFontSize" class="form-input" value="14" min="8" max="72"></div>
      <div class="form-group"><label>Color</label><input type="color" id="editColor" class="form-input" value="#000000" style="height:42px"></div>
    </div>
    <button class="btn-primary" id="actionBtn">✏️ Add Text & Download</button>
  </div>
  <div id="result" style="display:none" class="result-box">
    <p id="resultMsg">✅ Done!</p>
    <button class="btn-primary" id="downloadBtn">⬇️ Download</button>
  </div>
</div>
<div class="related-tools"><h2>Related PDF Tools</h2><div class="related-grid">
  <a href="compress.html" class="related-card"><span class="related-card-icon">🗜️</span><span class="related-card-name">Compress</span></a>
  <a href="merge.html" class="related-card"><span class="related-card-icon">📎</span><span class="related-card-name">Merge</span></a>
  <a href="split.html" class="related-card"><span class="related-card-icon">✂️</span><span class="related-card-name">Split</span></a>
  <a href="protect.html" class="related-card"><span class="related-card-icon">🔐</span><span class="related-card-name">Protect</span></a>
</div></div>
</main>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script>
const fi = document.getElementById('fileInput');
const dz = document.getElementById('dropZone');
let pdfBytes = null, fileName = '';
fi.addEventListener('change', e => handleFile(e.target.files[0]));
dz.addEventListener('dragover', e => { e.preventDefault(); dz.style.borderColor='var(--accent)'; });
dz.addEventListener('dragleave', () => { dz.style.borderColor=''; });
dz.addEventListener('drop', e => { e.preventDefault(); dz.style.borderColor=''; handleFile(e.dataTransfer.files[0]); });
function handleFile(f) {
  if (!f) return;
  fileName = f.name;
  f.arrayBuffer().then(buf => {
    pdfBytes = buf;
    document.getElementById('fileInfo').style.display = 'flex';
    document.getElementById('fileInfo').innerHTML = '<span>📄 '+f.name+'</span><span>'+(f.size/1024/1024).toFixed(2)+' MB</span>';
    document.getElementById('options').style.display = 'block';
  });
}

document.getElementById('actionBtn').addEventListener('click',async()=>{
  const text=document.getElementById('addText').value;
  if(!text)return alert('Enter text to add.');
  if(!pdfBytes)return alert('Select a PDF first.');
  const btn=document.getElementById('actionBtn');btn.textContent='🔄 Processing...';btn.disabled=true;
  try{
    const doc=await PDFLib.PDFDocument.load(pdfBytes);
    const pages=doc.getPages();
    const pi=Math.min(parseInt(document.getElementById('editPage').value)-1,pages.length-1);
    const font=await doc.embedFont(PDFLib.StandardFonts.Helvetica);
    const c=document.getElementById('editColor').value;
    pages[pi].drawText(text,{x:parseInt(document.getElementById('posX').value),y:parseInt(document.getElementById('posY').value),size:parseInt(document.getElementById('editFontSize').value),font,color:PDFLib.rgb(parseInt(c.substr(1,2),16)/255,parseInt(c.substr(3,2),16)/255,parseInt(c.substr(5,2),16)/255)});
    const bytes=await doc.save();
    const blob=new Blob([bytes],{type:'application/pdf'});
    document.getElementById('downloadBtn').onclick=()=>{const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='edited_'+fileName;a.click();};
    document.getElementById('resultMsg').textContent='✅ Text added!';
    document.getElementById('result').style.display='block';
  }catch(e){alert('Error: '+e.message);}
  btn.textContent='✏️ Add Text & Download';btn.disabled=false;
});
</script>
<script src="../assets/js/utils.js"></script>
</body>
</html>
