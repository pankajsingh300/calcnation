<main class="tool-page">
<div class="tool-header">
  <div class="tool-icon">🗑️</div>
  <h1>Remove Pages from PDF</h1>
  <p class="tool-desc">Delete specific pages from your PDF file. Enter page numbers to remove and download instantly.</p>
  <div class="tool-badges"><span class="badge">🔒 100% Private</span><span class="badge">⚡ Instant</span><span class="badge">✅ No Signup</span></div>
</div>
<div class="tool-card">
  <label for="fileInput" class="drop-zone" id="dropZone" style="cursor:pointer;display:block">
    <div class="drop-icon">📄</div>
    <p>Drop your PDF here or <span class="browse-link">browse to upload</span></p>
    <input type="file" id="fileInput" accept=".pdf" style="position:absolute;opacity:0;width:0;height:0;">
  </label>
  <div id="fileInfo" style="display:none" class="file-info"></div>
  <div id="options" style="display:none">
    <div class="form-group">
      <label id="pageCountLabel">Pages to Remove <span style="color:var(--text2)">(e.g. 1,3,5-8)</span></label>
      <input type="text" id="pagesToRemove" class="form-input" placeholder="e.g. 1,3,5-8">
    </div>
    <button class="btn-primary" id="removeBtn">🗑️ Remove Pages</button>
  </div>
  <div id="result" style="display:none" class="result-box">
    <p id="resultMsg"></p>
    <button class="btn-primary" id="downloadBtn">⬇️ Download PDF</button>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script>
const dz=document.getElementById('dropZone'),fi=document.getElementById('fileInput');
let pdfBytes=null,fileName='',totalPages=0;
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');handleFile(e.dataTransfer.files[0]);});
fi.addEventListener('change',e=>handleFile(e.target.files[0]));
async function handleFile(f){
  if(!f||!f.name.endsWith('.pdf'))return alert('Please select a PDF file.');
  fileName=f.name;pdfBytes=await f.arrayBuffer();
  const pdf=await PDFLib.PDFDocument.load(pdfBytes);
  totalPages=pdf.getPageCount();
  document.getElementById('fileInfo').style.display='block';
  document.getElementById('fileInfo').innerHTML=`<span>📄 ${f.name}</span><span>${totalPages} pages · ${(f.size/1024/1024).toFixed(2)} MB</span>`;
  document.getElementById('pageCountLabel').innerHTML=`Pages to Remove <span style="color:var(--text2)">(1–${totalPages}, e.g. 1,3,5-8)</span>`;
  document.getElementById('options').style.display='block';
}
function parsePages(str,total){
  const pages=new Set();
  str.split(',').forEach(part=>{
    part=part.trim();
    if(part.includes('-')){
      const [a,b]=part.split('-').map(Number);
      for(let i=a;i<=b&&i<=total;i++)pages.add(i);
    }else if(!isNaN(part)&&Number(part)>=1&&Number(part)<=total){
      pages.add(Number(part));
    }
  });
  return pages;
}
document.getElementById('removeBtn').addEventListener('click',async()=>{
  if(!pdfBytes)return;
  const btn=document.getElementById('removeBtn');btn.textContent='🔄 Processing...';btn.disabled=true;
  try{
    const toRemove=parsePages(document.getElementById('pagesToRemove').value,totalPages);
    if(toRemove.size===0)return alert('No valid pages entered.');
    if(toRemove.size>=totalPages)return alert('Cannot remove all pages.');
    const pdfDoc=await PDFLib.PDFDocument.load(pdfBytes);
    const newDoc=await PDFLib.PDFDocument.create();
    for(let i=1;i<=totalPages;i++){
      if(!toRemove.has(i)){
        const [copied]=await newDoc.copyPages(pdfDoc,[i-1]);
        newDoc.addPage(copied);
      }
    }
    const bytes=await newDoc.save();
    const blob=new Blob([bytes],{type:'application/pdf'});
    document.getElementById('downloadBtn').onclick=()=>{
      const a=document.createElement('a');a.href=URL.createObjectURL(blob);
      a.download='removed-pages_'+fileName;a.click();
    };
    document.getElementById('resultMsg').textContent=`✅ Removed ${toRemove.size} page(s). ${totalPages-toRemove.size} pages remaining.`;
    document.getElementById('result').style.display='block';
  }catch(e){alert('Error: '+e.message);}
  btn.textContent='🗑️ Remove Pages';btn.disabled=false;
});
</script>
