    <div id="uploadSection">
      <label for="pdfInput" class="upload-zone" id="uploadZone" style="cursor:pointer;display:block">
        <input type="file" id="pdfInput" accept=".pdf" style="display:none" onchange="loadPDF(this)">

        <div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:12px">Choose Rotation Angle</div>

          <button class="angle-btn active" id="btn90" onclick="setAngle(90)"><span class="angle-icon">↻</span>90° Clockwise</button>

        </div>

<script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="../assets/js/utils.js"></script>
<script>
let pdfFile=null, angle=90;
function setAngle(a){angle=a;document.querySelectorAll('.angle-btn').forEach(b=>b.classList.remove('active'));document.getElementById('btn'+a).classList.add('active');}
function loadPDF(input){
  pdfFile=input.files[0];if(!pdfFile)return;
  document.getElementById('fileName').textContent=pdfFile.name;
  document.getElementById('uploadSection').style.display='none';
  document.getElementById('rotateSection').style.display='block';
  const reader=new FileReader();
  reader.onload=async(e)=>{
    const pdf=await PDFLib.PDFDocument.load(e.target.result);
    document.getElementById('pageCount').textContent=pdf.getPageCount()+' pages';
  };
  reader.readAsArrayBuffer(pdfFile);
}
function resetTool(){pdfFile=null;document.getElementById('uploadSection').style.display='block';document.getElementById('rotateSection').style.display='none';document.getElementById('pdfInput').value='';}
async function rotatePDF(){
  if(!pdfFile)return;
  document.getElementById('progressWrap').style.display='block';
  setProgress(20);
  const buf=await pdfFile.arrayBuffer();
  const pdf=await PDFLib.PDFDocument.load(buf);
  setProgress(50);
  const degrees={90:PDFLib.degrees(90),180:PDFLib.degrees(180),270:PDFLib.degrees(270)};
  pdf.getPages().forEach(p=>{const cur=p.getRotation().angle;p.setRotation(PDFLib.degrees((cur+angle)%360));});
  setProgress(80);
  const bytes=await pdf.save();
  setProgress(100);
  const blob=new Blob([bytes],{type:'application/pdf'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='rotated-'+pdfFile.name;a.click();
  showToast('PDF rotated and downloaded!','success');
  setTimeout(()=>document.getElementById('progressWrap').style.display='none',1500);
}
function setProgress(p){document.getElementById('progressFill').style.width=p+'%';}
setupDragDrop('uploadZone','pdfInput',loadPDF);
</script><script src="/assets/js/nav-loader.js"></script>
