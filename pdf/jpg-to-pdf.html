<script>
const { PDFDocument, rgb } = PDFLib;
let images = [], pdfBytes = null, dragSrc = null;
const fileInput = document.getElementById('fileInput');
const uploadZone = document.getElementById('uploadZone');

setupDragDrop(uploadZone, f => addImages(f));
fileInput.addEventListener('change', () => addImages([...fileInput.files]));
function addMore() { fileInput.click(); }

function addImages(files) {
  const imgs = files.filter(f => f.type.startsWith('image/'));
  imgs.forEach(f => {
    const url = URL.createObjectURL(f);
    images.push({ file: f, url });
  });
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('imgGrid');
  const sec = document.getElementById('imgSection');
  const cnt = document.getElementById('imgCount');
  if (!images.length) { sec.style.display = 'none'; document.getElementById('settings').style.display='none'; document.getElementById('btnActions').style.display='none'; return; }
  sec.style.display = 'block';
  document.getElementById('settings').style.display = 'block';
  document.getElementById('btnActions').style.display = 'flex';
  cnt.textContent = `${images.length} image${images.length>1?'s':''} selected`;
  document.getElementById('resultBox').classList.remove('show');

  grid.innerHTML = images.map((img, i) => `
    <div class="img-thumb" draggable="true" data-index="${i}">
      <img src="${img.url}" alt="Image ${i+1}">
      <div class="img-thumb-info">${img.file.name}</div>
      <button class="img-thumb-remove" onclick="removeImg(${i})">✕</button>
    </div>`).join('');

  grid.querySelectorAll('.img-thumb').forEach(el => {
    el.addEventListener('dragstart', () => { dragSrc = parseInt(el.dataset.index); el.style.opacity='0.5'; });
    el.addEventListener('dragend', () => { el.style.opacity='1'; grid.querySelectorAll('.img-thumb').forEach(x=>x.classList.remove('drag-over-img')); });
    el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over-img'); });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over-img'));
    el.addEventListener('drop', e => {
      e.preventDefault(); const dest = parseInt(el.dataset.index);
      if (dragSrc === dest) return;
      const moved = images.splice(dragSrc,1)[0]; images.splice(dest,0,moved); renderGrid();
    });
  });
}

function removeImg(i) { URL.revokeObjectURL(images[i].url); images.splice(i,1); renderGrid(); }

async function loadImageData(imgObj) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(img,0,0);
      res({ dataUrl: canvas.toDataURL('image/jpeg', 0.95), width: img.naturalWidth, height: img.naturalHeight });
    };
    img.onerror = rej;
    img.src = imgObj.url;
  });
}

document.getElementById('convertBtn').addEventListener('click', async () => {
  if (!images.length) return;
  const btn = document.getElementById('convertBtn');
  btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> Creating PDF...';
  const pw = document.getElementById('progressWrap');
  const pb = document.getElementById('progressBar');
  const pl = document.getElementById('progressLabel');
  pw.classList.add('show');

  const pageSize = document.getElementById('pageSizeSelect').value;
  const margin = parseInt(document.getElementById('marginSelect').value);
  const onePerPage = document.getElementById('onePerPage').checked;

  const PAGE_SIZES = {
    A4: [595.28, 841.89],
    letter: [612, 792]
  };

  try {
    const pdf = await PDFDocument.create();
    let pages = 0;

    for (let i = 0; i < images.length; i++) {
      pb.style.width = Math.round((i/images.length)*90)+'%';
      pl.textContent = `Adding image ${i+1} of ${images.length}...`;

      const { dataUrl, width, height } = await loadImageData(images[i]);
      const imgData = dataUrl.split(',')[1];
      const pdfImg = await pdf.embedJpg(Uint8Array.from(atob(imgData), c => c.charCodeAt(0)));

      let pageW, pageH, drawX, drawY, drawW, drawH;

      if (pageSize === 'fit') {
        pageW = width + margin*2; pageH = height + margin*2;
        drawX = margin; drawY = margin; drawW = width; drawH = height;
      } else {
        [pageW, pageH] = PAGE_SIZES[pageSize];
        const availW = pageW - margin*2; const availH = pageH - margin*2;
        const scale = Math.min(availW/width, availH/height);
        drawW = width*scale; drawH = height*scale;
        drawX = (pageW-drawW)/2; drawY = (pageH-drawH)/2;
      }

      const page = pdf.addPage([pageW, pageH]);
      page.drawImage(pdfImg, { x:drawX, y:drawY, width:drawW, height:drawH });
      pages++;
    }

    pdfBytes = await pdf.save({ useObjectStreams: true });
    pb.style.width = '100%';

    document.getElementById('imgCount2').textContent = images.length + ' images';
    document.getElementById('pdfPages').textContent = pages + ' pages';
    document.getElementById('pdfSize').textContent = formatBytes(pdfBytes.length);

    setTimeout(() => { pw.classList.remove('show'); document.getElementById('resultBox').classList.add('show'); }, 400);
    showToast('PDF created successfully!');
  } catch(e) {
    showToast('Error: '+e.message, 'error'); pw.classList.remove('show');
  }
  btn.disabled=false; btn.innerHTML='📄 Convert to PDF';
});

document.getElementById('downloadBtn').addEventListener('click', () => {
  if (!pdfBytes) return;
  const blob = new Blob([pdfBytes], {type:'application/pdf'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'images.pdf'; a.click(); showToast('Download started!');
});

document.getElementById('resetBtn').addEventListener('click', () => {
  images.forEach(i => URL.revokeObjectURL(i.url)); images = []; pdfBytes = null;
  document.getElementById('imgSection').style.display='none';
  document.getElementById('settings').style.display='none';
  document.getElementById('btnActions').style.display='none';
  document.getElementById('resultBox').classList.remove('show');
  fileInput.value='';
});
</script>
